<script>
  // Mark a nav-list-item as animatable the moment its expander arrow is
  // actually clicked (capture phase runs before just-the-docs.js's own
  // bubble-phase handler toggles .active). This keeps the expand/collapse
  // transition for manual clicks while skipping it when the theme's JS
  // auto-opens the current page's section on every page load.
  //
  // Also enforces accordion behaviour: opening a section collapses any
  // sibling section at the same level that was already open, so exploring
  // a few categories doesn't leave the sidebar as one long scrolling list.
  // Read here (in capture phase, before just-the-docs.js's own bubble-phase
  // handler toggles .active) rather than after, so the pre-click state
  // reliably tells us whether this click is about to open or close the
  // item - listener registration order wouldn't guarantee that if both
  // handlers ran in the bubble phase.
  document.addEventListener(
    "click",
    function (e) {
      var btn = e.target.closest && e.target.closest(".nav-list-expander");
      if (!btn || !btn.parentNode) return;

      var item = btn.parentNode;
      item.classList.add("nav-animate");

      var isOpening = !item.classList.contains("active");
      if (!isOpening) return;

      var siblingList = item.parentNode;
      if (!siblingList) return;

      Array.prototype.forEach.call(siblingList.children, function (sibling) {
        if (sibling === item || !sibling.classList.contains("active")) return;
        sibling.classList.add("nav-animate");
        sibling.classList.remove("active");
        var siblingExpander = sibling.querySelector(":scope > .nav-list-expander");
        if (siblingExpander) siblingExpander.ariaExpanded = "false";
      });
    },
    true
  );

  // Full title on hover for nav labels truncated by the ellipsis CSS above.
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".nav-list-link").forEach(function (link) {
      var text = link.textContent.trim();
      if (text) link.title = text;
    });
  });

  // The theme auto-expands the active page's ancestor chain on load but
  // never scrolls it into view, so landing on a deeply nested page can put
  // the highlighted item outside the sidebar's visible (independently
  // scrolling) area with no indication it's there. Center it once layout
  // has settled.
  document.addEventListener("DOMContentLoaded", function () {
    var active = document.querySelector(".site-nav .nav-list-link.active");
    if (active) active.scrollIntoView({ block: "center" });
  });

  document.addEventListener("DOMContentLoaded", function () {
    var siteTitle = document.querySelector(".site-title");
    if (!siteTitle) return;

    siteTitle.innerHTML = "";
    siteTitle.classList.add("profile-title");

    var avatar = document.createElement("img");
    avatar.className = "profile-avatar";
    avatar.src = "https://github.com/FrancisVillalon.png";
    avatar.alt = "";
    siteTitle.appendChild(avatar);

    var name = document.createElement("span");
    name.className = "profile-name";
    name.textContent = "Francis Villalon";
    siteTitle.appendChild(name);

    var brand = document.createElement("span");
    brand.className = "profile-brand";
    brand.textContent = "Cybersecurity";
    siteTitle.appendChild(brand);

    var links = document.createElement("div");
    links.className = "profile-links";
    links.innerHTML =
      '<a href="https://github.com/FrancisVillalon" target="_blank" rel="noopener">GitHub</a>' +
      '<span class="profile-links-sep">&middot;</span>' +
      '<a href="https://linkedin.com/in/francisvillalon" target="_blank" rel="noopener">LinkedIn</a>';
    siteTitle.insertAdjacentElement("afterend", links);
  });

  document.addEventListener("DOMContentLoaded", function () {
    var content = document.querySelector(".main-content");
    if (!content) return;

    var firstP = content.querySelector("p");
    if (firstP) {
      var tagText = firstP.textContent.trim();
      if (/^(#\S+\s*)+$/.test(tagText)) {
        var tags = tagText.split(/\s+/).filter(Boolean);
        firstP.textContent = "";
        firstP.className = "tag-pills";
        tags.forEach(function (tag) {
          var span = document.createElement("span");
          span.className = "tag-pill";
          span.textContent = tag;
          firstP.appendChild(span);
        });
      }
    }

    {% if page.date %}
    var breadcrumbNav = document.querySelector(".breadcrumb-nav");
    if (breadcrumbNav) {
      var dateSpan = document.createElement("span");
      dateSpan.className = "breadcrumb-date";
      dateSpan.textContent = "Published {{ page.date | date: "%B %-d, %Y" }}";
      breadcrumbNav.appendChild(dateSpan);
    }
    {% endif %}
  });

  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".writeup-sort-select").forEach(function (select) {
      var cardsContainer = select.closest(".writeup-toolbar").nextElementSibling;
      if (!cardsContainer || !cardsContainer.classList.contains("writeup-cards")) return;

      var cards = Array.prototype.slice.call(cardsContainer.querySelectorAll(".writeup-card"));

      select.addEventListener("change", function () {
        var mode = select.value;
        var sorted = cards.slice();

        if (mode === "alpha") {
          sorted.sort(function (a, b) {
            return a.dataset.title.localeCompare(b.dataset.title);
          });
        } else if (mode === "difficulty") {
          sorted.sort(function (a, b) {
            var byRank = Number(b.dataset.difficultyRank) - Number(a.dataset.difficultyRank);
            return byRank !== 0 ? byRank : Number(a.dataset.defaultOrder) - Number(b.dataset.defaultOrder);
          });
        } else if (mode === "recent") {
          sorted.sort(function (a, b) {
            if (!a.dataset.date && !b.dataset.date) return 0;
            if (!a.dataset.date) return 1;
            if (!b.dataset.date) return -1;
            return b.dataset.date.localeCompare(a.dataset.date);
          });
        } else {
          sorted.sort(function (a, b) {
            return Number(a.dataset.defaultOrder) - Number(b.dataset.defaultOrder);
          });
        }

        sorted.forEach(function (card) {
          cardsContainer.appendChild(card);
        });
      });
    });
  });

  document.addEventListener("DOMContentLoaded", function () {
    var content = document.querySelector(".main-content");
    if (!content) return;

    var headings = content.querySelectorAll("h1, h2, h3");
    if (headings.length < 2) return;

    var toc = document.createElement("nav");
    toc.id = "page-toc";

    var title = document.createElement("div");
    title.className = "page-toc-title";
    title.textContent = "On this page";
    toc.appendChild(title);

    // Build an actual nested <ul> tree (h1 > h2 > h3) rather than one flat
    // list, so each depth gets its own guide line/indent step in CSS and
    // parents can show a "this branches" caret via .toc-has-children.
    var rootList = document.createElement("ul");
    var stack = [{ level: 0, ul: rootList, li: null }];

    headings.forEach(function (heading, i) {
      if (!heading.id) {
        heading.id = "toc-heading-" + i;
      }
      var level = parseInt(heading.tagName.slice(1), 10);

      while (stack.length > 1 && stack[stack.length - 1].level >= level) {
        stack.pop();
      }

      var parent = stack[stack.length - 1];
      if (!parent.ul) {
        parent.ul = document.createElement("ul");
        parent.li.appendChild(parent.ul);
        parent.li.classList.add("toc-has-children");

        var caret = document.createElement("span");
        caret.className = "toc-caret";
        caret.setAttribute("role", "button");
        caret.setAttribute("aria-label", "Toggle section");
        var parentLink = parent.li.querySelector("a");
        parentLink.insertBefore(caret, parentLink.firstChild);
      }

      var li = document.createElement("li");
      var a = document.createElement("a");
      a.href = "#" + heading.id;
      a.textContent = heading.textContent.trim().replace(/\s*#\s*$/, "");
      a.className = "toc-" + heading.tagName.toLowerCase();
      a.dataset.target = heading.id;
      li.appendChild(a);
      parent.ul.appendChild(li);

      stack.push({ level: level, ul: null, li: li });
    });

    toc.appendChild(rootList);
    document.body.appendChild(toc);

    var backdrop = document.createElement("div");
    backdrop.className = "page-toc-backdrop";
    document.body.appendChild(backdrop);

    var toggle = document.createElement("button");
    toggle.className = "page-toc-toggle";
    toggle.setAttribute("aria-label", "Toggle table of contents");
    toggle.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>';
    document.body.appendChild(toggle);

    function openToc() {
      toc.classList.add("page-toc-open");
      backdrop.classList.add("page-toc-open");
    }

    function closeToc() {
      toc.classList.remove("page-toc-open");
      backdrop.classList.remove("page-toc-open");
    }

    toggle.addEventListener("click", function () {
      if (toc.classList.contains("page-toc-open")) {
        closeToc();
      } else {
        openToc();
      }
    });

    backdrop.addEventListener("click", closeToc);

    toc.addEventListener("click", function (e) {
      var caret = e.target.closest(".toc-caret");
      if (caret) {
        e.preventDefault();
        e.stopPropagation();
        caret.closest("li").classList.toggle("toc-collapsed");
        return;
      }

      // On the narrow-screen drawer, tapping a heading link should also
      // close the drawer so it doesn't sit on top of the section just
      // navigated to.
      if (e.target.closest("a")) {
        closeToc();
      }
    });

    var links = toc.querySelectorAll("a");
    var observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          var link = toc.querySelector('a[data-target="' + entry.target.id + '"]');
          if (!link) return;
          if (entry.isIntersecting) {
            links.forEach(function (l) { l.classList.remove("active"); });
            link.classList.add("active");
          }
        });
      },
      { rootMargin: "0px 0px -70% 0px" }
    );

    headings.forEach(function (heading) {
      observer.observe(heading);
    });
  });

  document.addEventListener("DOMContentLoaded", function () {
    var alertLabels = {
      NOTE: "Note",
      TIP: "Tip",
      IMPORTANT: "Important",
      WARNING: "Warning",
      CAUTION: "Caution"
    };
    var alertIcons = {
      NOTE: "ℹ️",
      TIP: "💡",
      IMPORTANT: "❗",
      WARNING: "⚠️",
      CAUTION: "🛑"
    };

    document.querySelectorAll(".main-content blockquote").forEach(function (bq) {
      var p = bq.querySelector("p:first-child");
      if (!p || !p.firstChild || p.firstChild.nodeType !== Node.TEXT_NODE) return;

      var text = p.firstChild.textContent;
      var match = text.match(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/i);
      if (!match) return;

      var type = match[1].toUpperCase();
      p.firstChild.textContent = text.slice(match[0].length);

      bq.classList.add("gh-alert", "gh-alert-" + type.toLowerCase());

      var title = document.createElement("p");
      title.className = "gh-alert-title";
      title.textContent = alertIcons[type] + " " + alertLabels[type];
      bq.insertBefore(title, bq.firstChild);
    });
  });

  document.addEventListener("DOMContentLoaded", function () {
    var content = document.querySelector(".main-content");
    if (!content) return;

    var overlay = document.createElement("div");
    overlay.className = "lightbox-overlay";

    var overlayImg = document.createElement("img");
    overlay.appendChild(overlayImg);

    var closeBtn = document.createElement("button");
    closeBtn.className = "lightbox-close";
    closeBtn.setAttribute("aria-label", "Close");
    closeBtn.innerHTML = "&times;";
    // Appended inside overlay (not document.body) so it inherits the
    // overlay's own visibility/opacity state via CSS instead of needing a
    // separately toggled `hidden` attribute, which display:flex overrode.
    overlay.appendChild(closeBtn);

    document.body.appendChild(overlay);

    function openLightbox(img) {
      overlayImg.src = img.currentSrc || img.src;
      overlayImg.alt = img.alt || "";
      overlay.classList.add("lightbox-open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      overlay.classList.remove("lightbox-open");
      document.body.style.overflow = "";
    }

    content.querySelectorAll("img").forEach(function (img) {
      img.addEventListener("click", function () {
        openLightbox(img);
      });
    });

    overlay.addEventListener("click", closeLightbox);
    closeBtn.addEventListener("click", closeLightbox);
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeLightbox();
    });
  });

  document.addEventListener("DOMContentLoaded", function () {
    if (!window.mermaid) return;

    // Kramdown has no built-in mermaid renderer - a ```mermaid fenced code
    // block just comes out as <pre><code class="language-mermaid">raw text
    // (unlike GitHub, which renders these natively). Swap each one for a
    // <div class="mermaid"> containing the decoded source, then let the
    // mermaid.js library (loaded above) render it client-side.
    var blocks = document.querySelectorAll("code.language-mermaid");
    if (!blocks.length) return;

    blocks.forEach(function (code) {
      var pre = code.closest("pre") || code;
      var div = document.createElement("div");
      div.className = "mermaid";
      div.textContent = code.textContent;
      pre.replaceWith(div);
    });

    mermaid.initialize({ startOnLoad: false, theme: "dark" });
    mermaid.run({ querySelector: ".mermaid" });
  });
</script>
